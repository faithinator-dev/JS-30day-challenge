
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Color Makeover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">
    <div class="card" id="card">
        <h1>Background Color</h1>
        <div class="color-display" id="hexDisplay" onclick="copyToClipboard()">#0F172A</div>
        <div class="color-info" id="rgbDisplay">rgb(15, 23, 42)</div>
        
        <button class="btn" id="generateBtn">Generate New Color</button>
    </div>

    <div class="tooltip" id="tooltip">Copied to clipboard!</div>
    <script src="script.js"></script>
</body>
</html>
