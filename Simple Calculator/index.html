
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e5ec;
            padding: 20px;
        }

        .calculator {
            background-color: #e0e5ec;
            width: 100%;
            max-width: 360px;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 
                9px 9px 16px rgba(163, 177, 198, 0.6), 
                -9px -9px 16px rgba(255, 255, 255, 0.5);
        }

        /* Screen Display */
        .screen {
            background-color: #e0e5ec;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: right;
            box-shadow: 
                inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7),
                inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8);
        }

        .previous-operand {
            color: #8c98a9;
            font-size: 1.1rem;
            min-height: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .current-operand {
            color: #3b4351;
            font-size: 2.5rem;
            font-weight: 700;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* Buttons Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            border: none;
            outline: none;
            background-color: #e0e5ec;
            border-radius: 15px;
            padding: 20px 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: #3b4351;
            cursor: pointer;
            box-shadow: 
                6px 6px 10px rgba(163, 177, 198, 0.6), 
                -6px -6px 10px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        button:active {
            box-shadow: 
                inset 4px 4px 8px rgba(163, 177, 198, 0.6), 
                inset -4px -4px 8px rgba(255, 255, 255, 0.5);
            transform: scale(0.97);
        }

        /* Special Buttons */
        .operator {
            color: #4facfe;
            font-weight: 700;
            font-size: 1.4rem;
        }

        .clear {
            color: #ff6b6b;
            font-weight: 700;
        }

        .equals {
            grid-row: span 2;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }
        
        .equals:active {
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #439ce0, #00dcf0);
        }

    </style>
</head>
<body>

    <div class="calculator">
        <div class="screen">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>

        <div class="keypad">
            <button class="clear" onclick="calculator.clear()">AC</button>
            <button class="operator" onclick="calculator.delete()">DEL</button>
            <button class="operator" onclick="calculator.chooseOperation('÷')">÷</button>
            <button class="operator" onclick="calculator.chooseOperation('×')">×</button>

            <button onclick="calculator.appendNumber('7')">7</button>
            <button onclick="calculator.appendNumber('8')">8</button>
            <button onclick="calculator.appendNumber('9')">9</button>
            <button class="operator" onclick="calculator.chooseOperation('-')">−</button>

            <button onclick="calculator.appendNumber('4')">4</button>
            <button onclick="calculator.appendNumber('5')">5</button>
            <button onclick="calculator.appendNumber('6')">6</button>
            <button class="operator" onclick="calculator.chooseOperation('+')">+</button>

            <button onclick="calculator.appendNumber('1')">1</button>
            <button onclick="calculator.appendNumber('2')">2</button>
            <button onclick="calculator.appendNumber('3')">3</button>
            <button class="equals" onclick="calculator.compute()">=</button>
            <button onclick="calculator.appendNumber('0')" style="grid-column: span 2;">0</button>
            <button onclick="calculator.appendNumber('.')">.</button>
            
        </div>
    </div>

    <script>
        class Calculator {
            constructor(previousOperandElement, currentOperandElement) {
                this.previousOperandElement = previousOperandElement;
                this.currentOperandElement = currentOperandElement;
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.updateDisplay();
            }

            delete() {
                if (this.currentOperand === '0') return;
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
                if (this.currentOperand === '') {
                    this.currentOperand = '0';
                }
                this.updateDisplay();
            }

            appendNumber(number) {
                if (number === '.' && this.currentOperand.includes('.')) return;
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
                this.updateDisplay();
            }

            chooseOperation(operation) {
                if (this.currentOperand === '0' && this.previousOperand === '') return;
                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '0';
                this.updateDisplay();
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                
                if (isNaN(prev) || isNaN(current)) return;

                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '−':
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                    case '*':
                        computation = prev * current;
                        break;
                    case '÷':
                    case '/':
                        if (current === 0) {
                            alert("Cannot divide by zero!");
                            this.clear();
                            return;
                        }
                        computation = prev / current;
                        break;
                    default:
                        return;
                }
                
                // Fix floating point precision issues (e.g., 0.1 + 0.2)
                this.currentOperand = Math.round(computation * 10000000000) / 10000000000;
                this.operation = undefined;
                this.previousOperand = '';
                this.updateDisplay();
            }

            getDisplayNumber(number) {
                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                
                let integerDisplay;
                if (isNaN(integerDigits)) {
                    integerDisplay = '0';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
                }
                
                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }

            updateDisplay() {
                this.currentOperandElement.innerText = this.getDisplayNumber(this.currentOperand);
                if (this.operation != null) {
                    this.previousOperandElement.innerText = `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.previousOperandElement.innerText = '';
                }
            }
        }

        const previousOperandElement = document.getElementById('previous-operand');
        const currentOperandElement = document.getElementById('current-operand');

        const calculator = new Calculator(previousOperandElement, currentOperandElement);

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9' || e.key === '.') {
                calculator.appendNumber(e.key);
                calculator.updateDisplay();
            }
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                calculator.chooseOperation(e.key === '*' ? '×' : (e.key === '/' ? '÷' : (e.key === '-' ? '−' : '+')));
                calculator.updateDisplay();
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculator.compute();
                calculator.updateDisplay();
            }
            if (e.key === 'Backspace') {
                calculator.delete();
                calculator.updateDisplay();
            }
            if (e.key === 'Escape') {
                calculator.clear();
                calculator.updateDisplay();
            }
        });
    </script>
</body>
</html>
