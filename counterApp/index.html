<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class=" bg-dark text-white d-flex flex-column align-items-center justify-content-center vh-100">
    <h1 class="mb-4">Counter App</h1>

    <div class="d-flex align-items-center mb-4 w-100 justify-content-between">
        <button id="decrement" class="btn btn-danger me-3 px-3 py-0 fs-3 rounded-circle">-</button>
        <span id="counter" class="fs-3">0</span>
        <button id="increment" class="btn btn-success ms-3 px-3 py-1 fs-3 rounded-circle">+</button>
    </div>
    <div class="button d-flex justify-content-center">
        <div class="" id="autoCount">
        <button id="start">Start Counting</button>
        </div>
        <button id="reset">reset</button>
        <!-- <button></button> -->
    </div>
    <script src="counter.js"></script>
    
</body>
</html>
