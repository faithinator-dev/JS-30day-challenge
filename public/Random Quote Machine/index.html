
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Machine | Random Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quote-box" id="quote-box">
        <div class="quote-icon">“</div>
        
        <div id="text">The only way to do great work is to love what you do.</div>
        <div id="author">— Steve Jobs</div>

        <div class="buttons">
            <a href="x.com/" id="tweet-quote" target="_blank" title="Post to X">Share on X</a>
            <button id="new-quote" class="btn">New Quote</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
