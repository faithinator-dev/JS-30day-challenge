
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Tip Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="inputs-section">
            <div class="input-group">
                <label for="bill">Bill</label>
                <div class="input-wrapper bill-wrapper">
                    <input type="number" id="bill" placeholder="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Select Tip %</label>
                <div class="tip-grid">
                    <button class="tip-btn" data-tip="5">5%</button>
                    <button class="tip-btn" data-tip="10">10%</button>
                    <button class="tip-btn" data-tip="15">15%</button>
                    <button class="tip-btn" data-tip="25">25%</button>
                    <button class="tip-btn" data-tip="50">50%</button>
                    <input type="number" class="custom-tip" placeholder="Custom" id="custom-tip">
                </div>
            </div>

            <div class="input-group" id="people-group">
                <div style="display: flex; justify-content: space-between;">
                    <label for="people">Number of People</label>
                    <span class="error-msg">Can't be zero</span>
                </div>
                <div class="input-wrapper people-wrapper">
                    <input type="number" id="people" placeholder="0">
                </div>
            </div>
        </div>

        <div class="results-section">
            <div>
                <div class="result-row">
                    <div class="result-label">
                        <h3>Tip Amount</h3>
                        <p>/ person</p>
                    </div>
                    <div class="result-amount" id="tip-amount">$0.00</div>
                </div>

                <div class="result-row">
                    <div class="result-label">
                        <h3>Total</h3>
                        <p>/ person</p>
                    </div>
                    <div class="result-amount" id="total-amount">$0.00</div>
                </div>
            </div>

            <button class="reset-btn" id="reset-btn">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
