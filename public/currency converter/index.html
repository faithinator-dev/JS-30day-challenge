
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-card" id="card">
        <h1>Converter</h1>
        
        <div class="input-group">
            <label>Amount</label>
            <input type="number" id="amount" value="1" min="1">
        </div>

        <div style="display: flex; flex-direction: column;">
            <div class="input-group">
                <label>From</label>
                <select id="from-currency">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="NGN" selected>NGN - Nigerian Naira</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                </select>
            </div>

            <div class="swap-row">
                <button class="swap-btn" id="swap">⇅</button>
            </div>

            <div class="input-group">
                <label>To</label>
                <select id="to-currency">
                    <option value="USD" selected>USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="NGN">NGN - Nigerian Naira</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                </select>
            </div>
        </div>

        <div class="result-box">
            <span class="result-val" id="result">0.00</span>
            <span class="rate-info" id="rate">Getting latest rates...</span>
        </div>
    </div>

    <script src="script.js">
        
    </script>
</body>
</html>
