<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Digital Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">    
</head>

<body>
    <div class="clock-card">
        <div class="date-display" id="dateDisplay">Saturday, March 14</div>
        
        <div class="time-display">
            <div class="time" id="timeDisplay">12:50</div>
            <div class="seconds-ampm">
                <div class="seconds" id="secondsDisplay">00</div>
                <div class="ampm" id="ampmDisplay">PM</div>
            </div>
        </div>

        <button class="toggle-btn" id="toggleFormat">Switch to 24H</button>
    </div>

    <script src="script.js"></script>
        
</body>
</html>
