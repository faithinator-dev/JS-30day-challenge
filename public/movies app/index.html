
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch | Movie Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">CINESEARCH</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search for movies or TV shows...">
        </div>
    </header>
    <input type="text" class="search" id="search" placeholder="Search for movies or TV shows...">
    <div id="loading" class="loading">Searching...</div>
    <div class="movies-grid" id="grid">
        <div class="empty-msg">Type something in the search area to explore the world of cinema</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
