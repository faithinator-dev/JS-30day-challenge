<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Tech Quiz</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="quiz-container" id="quiz">
      <div id="quiz-content">
        <div class="quiz-header">
          <span class="progress-text" id="progress">Question 1 of 5</span>
          <span id="timer" style="font-weight: 700; color: #ef4444"></span>
        </div>
        <h2 class="question-text" id="question">What does HTML stand for?</h2>
        <div class="options-list" id="options">
        </div>
        <button class="btn-next" id="next-btn">Next Question</button>
      </div>

      <div class="result-screen" id="result">
        <div class="score-circle" id="final-score">0</div>
        <h2 style="font-size: 2rem; margin-bottom: 15px">Quiz Completed!</h2>
        <p id="result-msg" style="color: #718096; margin-bottom: 30px">
          Great job! You've got a solid grasp of tech basics.
        </p>
        <button class="btn-next active" onclick="location.reload()">
          Restart Quiz
        </button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
