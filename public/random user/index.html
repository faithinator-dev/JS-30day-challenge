
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="user-card">
        <img src="https://via.placeholder.com/150" alt="User" class="user-img" id="img">
        <h2 class="name" id="name">Loading...</h2>
        <p class="username" id="username">@username</p>
        
        <div class="info-grid">
            <div class="info-item"><label>Email</label><span id="email">...</span></div>
            <div class="info-item"><label>Phone</label><span id="phone">...</span></div>
            <div class="info-item"><label>Location</label><span id="location">...</span></div>
            <div class="info-item"><label>Age</label><span id="age">...</span></div>
        </div>

        <button class="btn" id="gen-btn">Generate New User</button>
    </div>

    <script src="script.js"> </script>
</body>
</html>
