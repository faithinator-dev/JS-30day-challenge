
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Recipe Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Find Your Next Meal</h1>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search by name (e.g. Pasta, Chicken, Cake)">
            <button class="btn-search" id="search-btn">Search</button>
        </div>
    </header>

    <div class="recipes-grid" id="grid">

    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-modal" id="close">&times;</span>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
